name: Publish Packages

permissions:
  contents: read

concurrency:
  group: publish-${{ github.event.inputs.release_tag }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish from (e.g., v0.0.104)"
        required: true
        type: string
        default: v0.0.104
      publish_csharp:
        description: "Publish C# NuGet package"
        required: false
        type: boolean
        default: true
      publish_common:
        description: "Publish @json-eval-rs/common npm package"
        required: false
        type: boolean
        default: true
      publish_web:
        description: "Publish Web npm package"
        required: false
        type: boolean
        default: true
      publish_react_native:
        description: "Publish React Native npm package"
        required: false
        type: boolean
        default: true
      publish_crates_io:
        description: "Publish Rust crate to crates.io"
        required: false
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Validate the manually selected release before publishing packages.
  check-workflow:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.get-tag.outputs.tag }}
      should_run: ${{ steps.get-tag.outputs.should_run }}

    steps:
      - name: Validate release tag
        id: get-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.release_tag }}"
          if [ -z "$TAG" ]; then
            echo "❌ ERROR: release_tag is required"
            exit 1
          fi

          echo "🔍 Validating release exists: $TAG"
          gh release view "$TAG" --repo "${{ github.repository }}" > /dev/null

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "should_run=true" >> $GITHUB_OUTPUT
          echo "📦 Publishing packages from release: $TAG"

  # Publish C# NuGet package (download directly from release)
  publish-csharp:
    if: |
      needs.check-workflow.outputs.should_run == 'true' &&
      github.event.inputs.publish_csharp == 'true'
    needs: [check-workflow]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Download NuGet package from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.check-workflow.outputs.release_tag }}"
          echo "📦 Downloading NuGet package from release: $TAG"

          mkdir -p packages
          cd packages
          gh release download "$TAG" --pattern "*.nupkg"
          test -n "$(find . -maxdepth 1 -name '*.nupkg' -print -quit)"
          ls -lh *.nupkg

      - name: Publish to NuGet
        run: |
          NUPKG=$(find packages -name "*.nupkg" -type f | head -n 1)
          if [ -z "$NUPKG" ]; then
            echo "❌ No NuGet package found in release"
            echo "Available files:"
            ls -lh packages/
            exit 1
          fi

          echo "Publishing: $(basename $NUPKG)"
          echo "Full path: $NUPKG"

          dotnet nuget push "$NUPKG" \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

  # Publish @json-eval-rs/common npm package (download directly from release)
  publish-common:
    if: |
      needs.check-workflow.outputs.should_run == 'true' &&
      github.event.inputs.publish_common == 'true'
    needs: [check-workflow]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"

      - name: Download common package from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.check-workflow.outputs.release_tag }}"
          echo "📦 Downloading common package from release: $TAG"
          mkdir -p packages
          cd packages
          # Download only the common package (not webcore/bundler/node/RN)
          gh release download "$TAG" --pattern "json-eval-rs-common-*.tgz"
          test -n "$(find . -maxdepth 1 -name 'json-eval-rs-common-*.tgz' -print -quit)"
          ls -lh *.tgz

      - name: Publish common package to npm
        run: |
          PKG=$(find packages -name "json-eval-rs-common-*.tgz" -type f | head -n 1)
          if [ -z "$PKG" ]; then
            echo "❌ No common package found"
            ls -lh packages/
            exit 1
          fi
          echo "Publishing: $(basename $PKG)"
          cd packages
          npm publish "$(basename $PKG)" --access public --dry-run
          npm publish "$(basename $PKG)" --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Publish Web npm packages (download directly from release)
  publish-web:
    if: |
      always() &&
      needs.check-workflow.outputs.should_run == 'true' &&
      (needs.publish-common.result == 'success' || needs.publish-common.result == 'skipped') &&
      github.event.inputs.publish_web == 'true'
    needs: [check-workflow, publish-common]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"

      - name: Download web packages from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.check-workflow.outputs.release_tag }}"
          echo "📦 Downloading web packages from release: $TAG"

          mkdir -p packages
          cd packages

          # Download all .tgz files except React Native
          gh release download "$TAG" --pattern "*.tgz"

          echo ""
          echo "Downloaded packages:"
          test -n "$(find . -maxdepth 1 -name '*.tgz' -print -quit)"
          ls -lh *.tgz

      - name: Publish web packages to npm
        run: |
          echo "📦 Available release files:"
          ls -lh packages/
          echo ""

          # Find and publish all web-related .tgz packages (webcore, bundler, node, vanilla)
          PUBLISHED=0

          # Change into packages directory to ensure npm treats paths as local files
          cd packages

          # Look for web package tarballs (they should be directly in packages/)
          for pkg in *.tgz; do
            # Skip React Native and common packages (published separately)
            if [[ "$pkg" == *"react-native"* ]] || [[ "$pkg" == *"json-eval-rs-common"* ]]; then
              echo "Skipping $pkg (published separately)"
              continue
            fi

            if [ -f "$pkg" ]; then
              echo ""
              echo "📦 Processing: $pkg"
              echo "Full path: $(pwd)/$pkg"

              # Verify the tarball is valid
              if ! tar -tzf "$pkg" > /dev/null 2>&1; then
                echo "⚠️ WARNING: Invalid tarball file, skipping: $pkg"
                continue
              fi

              # Extract and display package info
              mkdir -p /tmp/pkg-inspect
              tar -xzf "$pkg" -C /tmp/pkg-inspect package/package.json 2>/dev/null || true
              if [ -f /tmp/pkg-inspect/package/package.json ]; then
                PKG_NAME=$(grep -o '"name"[[:space:]]*:[[:space:]]*"[^"]*"' /tmp/pkg-inspect/package/package.json | cut -d'"' -f4)
                PKG_VERSION=$(grep -o '"version"[[:space:]]*:[[:space:]]*"[^"]*"' /tmp/pkg-inspect/package/package.json | cut -d'"' -f4)
                echo "  📋 Package: $PKG_NAME@$PKG_VERSION"
              fi
              rm -rf /tmp/pkg-inspect

              # Publish (use ./ to force local file interpretation)
              echo "  🚀 Publishing to npm..."
              npm publish "./$pkg" --access public --dry-run
              npm publish "./$pkg" --access public
              echo "  ✅ Published successfully"
              PUBLISHED=$((PUBLISHED + 1))
            fi
          done

          if [ $PUBLISHED -eq 0 ]; then
            echo ""
            echo "❌ No web packages were published"
            echo ""
            echo "Expected to find: @json-eval-rs/webcore, @json-eval-rs/bundler, @json-eval-rs/node, @json-eval-rs/vanilla"
            echo "Available files in packages/:"
            ls -lh
            echo ""
            echo "⚠️ Web packages should be directly in the packages/ directory"
            echo "   Check the 'Release and Build' workflow's web-packages artifact"
            exit 1
          fi

          echo ""
          echo "✅ Successfully published $PUBLISHED web package(s)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Publish React Native npm package (download directly from release)
  publish-react-native:
    if: |
      always() &&
      needs.check-workflow.outputs.should_run == 'true' &&
      (needs.publish-common.result == 'success' || needs.publish-common.result == 'skipped') &&
      github.event.inputs.publish_react_native == 'true'
    needs: [check-workflow, publish-common]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"

      - name: Download React Native package from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.check-workflow.outputs.release_tag }}"
          echo "📦 Downloading React Native package from release: $TAG"

          mkdir -p packages
          cd packages
          gh release download "$TAG" --pattern "*react-native*.tgz"

          echo ""
          echo "Downloaded package:"
          test -n "$(find . -maxdepth 1 -name '*react-native*.tgz' -print -quit)"
          ls -lh *react-native*.tgz

      - name: Inspect and publish React Native package
        run: |
          RN_PKG=$(find packages -name "*react-native*.tgz" -type f | head -n 1)
          if [ -z "$RN_PKG" ]; then
            echo "❌ No React Native package found in release"
            echo "Available files:"
            ls -lh packages/
            exit 1
          fi

          echo "Publishing: $(basename $RN_PKG)"
          echo "Full path: $RN_PKG"

          # Verify the tarball is valid
          if ! tar -tzf "$RN_PKG" > /dev/null 2>&1; then
            echo "❌ ERROR: Invalid tarball file"
            exit 1
          fi

          # Extract and inspect package.json
          echo ""
          echo "📋 Inspecting package.json..."
          mkdir -p /tmp/inspect
          tar -xzf "$RN_PKG" -C /tmp/inspect package/package.json 2>/dev/null || true
          if [ -f /tmp/inspect/package/package.json ]; then
            echo "Package name: $(grep -o '"name"[[:space:]]*:[[:space:]]*"[^"]*"' /tmp/inspect/package/package.json | cut -d'"' -f4)"
            echo "Package version: $(grep -o '"version"[[:space:]]*:[[:space:]]*"[^"]*"' /tmp/inspect/package/package.json | cut -d'"' -f4)"
            echo "First 20 lines of package.json:"
            head -20 /tmp/inspect/package/package.json
          fi

          echo ""
          echo "🚀 Publishing to npm..."

          # Publish directly without path manipulation
          cd packages
          npm publish "$(basename $RN_PKG)" --access public --dry-run
          echo ""
          echo "Dry run successful, publishing for real..."
          npm publish "$(basename $RN_PKG)" --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Publish Rust crate to crates.io
  publish-crates-io:
    if: |
      needs.check-workflow.outputs.should_run == 'true' &&
      github.event.inputs.publish_crates_io == 'true'
    needs: [check-workflow]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Validate crates.io package
        run: cargo publish --dry-run

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Summary
  publish-summary:
    if: always()
    needs:
      [
        check-workflow,
        publish-csharp,
        publish-common,
        publish-web,
        publish-react-native,
        publish-crates-io,
      ]
    runs-on: ubuntu-latest

    steps:
      - name: Publish Summary
        run: |
          echo "## 📦 Publish Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Release Tag" >> $GITHUB_STEP_SUMMARY
          echo "📦 **${{ needs.check-workflow.outputs.release_tag }}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Published Packages" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| C# NuGet | ${{ needs.publish-csharp.result == 'success' && '✅' || needs.publish-csharp.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Common npm | ${{ needs.publish-common.result == 'success' && '✅' || needs.publish-common.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Web npm | ${{ needs.publish-web.result == 'success' && '✅' || needs.publish-web.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| React Native npm | ${{ needs.publish-react-native.result == 'success' && '✅' || needs.publish-react-native.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Rust crates.io | ${{ needs.publish-crates-io.result == 'success' && '✅' || needs.publish-crates-io.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📝 Note" >> $GITHUB_STEP_SUMMARY
          echo "All packages are published from pre-built artifacts in GitHub Release ${{ needs.check-workflow.outputs.release_tag }}." >> $GITHUB_STEP_SUMMARY
